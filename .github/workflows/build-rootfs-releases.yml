name: Build and Release Droidspaces RootFS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Build ID
        run: |
          BUILD_DATE=$(date +'%Y-%m-%d %H:%M:%S')
          BUILD_ID="v$(date +'%Y%m%d-%H%M%S')"
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV
          echo "Using Build ID: $BUILD_ID"

      - name: Build RootFS
        run: |
          chmod +x build_rootfs.sh
          # The script handles binfmt and buildx setup internally
          VERSION="${{ env.BUILD_ID }}" ./build_rootfs.sh

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_ID }}
          name: "Droidspaces RootFS ${{ env.BUILD_ID }}"
          files: "*.tar.gz"
          body: |
            Automated Droidspaces RootFS Build
            Built on: ${{ env.BUILD_DATE }}
            Build ID: ${{ env.BUILD_ID }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts (Fallback)
        uses: actions/upload-artifact@v4
        with:
          name: droidspaces-rootfs-${{ env.BUILD_ID }}
          path: "*.tar.gz"
          retention-days: 7
